name: ai-study-platform

services:
  mysql:
    image: mysql:8.0
    container_name: aistudy-mysql
    restart: unless-stopped
    ports:
      - "13306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ruoyi-vue-pro-jdk8}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - aistudy-mysql:/var/lib/mysql
      - ./sql/mysql:/sql/mysql:ro
      - ./script/docker/aistudy/mysql/00-init-aistudy.sh:/docker-entrypoint-initdb.d/00-init-aistudy.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: aistudy-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes
    volumes:
      - aistudy-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  server:
    build:
      context: .
      dockerfile: script/docker/aistudy/server.Dockerfile
    image: aistudy-server:local
    container_name: aistudy-server
    restart: unless-stopped
    ports:
      - "48080:48080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DIFY_BASE_URL: ${AISTUDY_DIFY_BASE_URL:-https://api.dify.ai/v1}
      DIFY_CHAT_API_KEY: ${AISTUDY_DIFY_CHAT_API_KEY:-}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m -Djava.security.egd=file:/dev/./urandom}
      ARGS: >-
        --spring.datasource.dynamic.datasource.master.url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ruoyi-vue-pro-jdk8}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
        --spring.datasource.dynamic.datasource.master.username=root
        --spring.datasource.dynamic.datasource.master.password=${MYSQL_ROOT_PASSWORD:-root}
        --spring.datasource.dynamic.datasource.slave.url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ruoyi-vue-pro-jdk8}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
        --spring.datasource.dynamic.datasource.slave.username=root
        --spring.datasource.dynamic.datasource.slave.password=${MYSQL_ROOT_PASSWORD:-root}
        --spring.redis.host=redis
        --spring.redis.port=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: script/docker/aistudy/admin.Dockerfile
    image: aistudy-admin:local
    container_name: aistudy-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  aistudy-mysql:
  aistudy-redis:
